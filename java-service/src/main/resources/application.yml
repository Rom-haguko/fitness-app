server:
  port: 8080

spring:
  application:
    name: java-service

  datasource:
    url: jdbc:postgresql://postgres-db:5432/fitness_tracker
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  thymeleaf:
    cache: false
    encoding: UTF-8

  security:
    user:
      name: admin
      password: admin

services:
  python-ai:
    url: http://python-service:8000
  go-stats:
    url: http://go-service:8081