version: '3.8'

services:
  java-service:
    build: ./java-service
    container_name: java-service
    volumes:
      - ./java-service/src:/app/src        
      - ./java-service/target:/app/target  
    ports:
      - "8080:8080"
    depends_on:
      - db

  go-service:
    build: ./go-service
    container_name: go-service
    volumes:
      - ./go-service:/app                  
    ports:
      - "8081:8081"
    depends_on:
      - db

  python-service:
    build: ./python-service
    container_name: python-service
    volumes:
      - ./python-service:/app 
    ports:
      - "8000:8000"
    depends_on:
      - db
db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fitness_tracker
    volumes:
      - fitness-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

volumes:
  fitness-db-data:
    driver: local
